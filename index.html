<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 18 - Устраняем ошибку в коде
    Втсавляем команду -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+AU+QLD:wght@100..400&display=swap" rel="stylesheet">

<body>


 

<div id="particles-js"></div>  

<div class="main-container">
     
    <div class="banner-container">
      <h1>Santa Claus <br> is  coming to town!</h1>

      <div class="container-countdown">
        <!-- 1 -->
        <div class="christmas">
            <div class="block">
                 <h4 class="days"></h4>
                <h3>DAYS</h3>
            </div>
        </div>

        <!-- 2 -->
        <div class="christmas">
             <div class="block">
                 <h4 class="hours"></h4>
                <h3>HOURS</h3>
            </div>
        </div>

        <!-- 3 -->
        <div class="christmas">
            <div class="block">
                 <h4 class="minutes"></h4>
                 <h3>MINUTES</h3>
            </div>
        </div>

        <!-- 4 -->
        <div class="christmas">
            <div class="block">
                 <h4 class="seconds"></h4>
                <h3>SECONDS</h3>
            </div>
        </div>
      </div>
    </div>


    <audio id="myAudio" src="song.mp3" loop="loop" autoplay="allowed"></audio>
    <div class="button-ornament">
        <button id="myButton"><img src="play.png" alt="Play button" width="64px"></button>
        <div class="ornaments">
            <img src="white.png" class="box white">
            <img src="red.png" class="box red">
            <img src="white.png" class="box white">
            <img src="red.png" class="box red">
            <img src="white.png" class="box white">
            <img src="red.png" class="box red">
      </div>

    </div>
    
  
    <!-- <img class="ornament" src="ornament.png" alt="ornament"  height="127px"> -->
</div>











<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script src="script.js"></script>
</body>
</html>
